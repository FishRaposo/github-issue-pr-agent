# Alembic single-database configuration.

[alembic]
# Path to migration scripts, relative to this file.
script_location = %(here)s/alembic

# sys.path entry prepended for env.py imports.
prepend_sys_path = .

path_separator = os

# The database URL is set dynamically in env.py from AppConfig.DATABASE_URL.
# sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
